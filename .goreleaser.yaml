version: 2

project_name: hddmount-tui

before:
  hooks:
    - go mod tidy

builds:
  - id: hddmount
    main: ./cmd/hddmount
    binary: hddmount
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    # Ubuntu 18.04/20.04/22.04 전체 지원: 정적 바이너리이므로 glibc 버전
    # 걱정 없이 동일 바이너리가 세 버전 모두에서 동작합니다.
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: hddmount-archive
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - id: hddmount-deb
    package_name: hddmount-tui
    file_name_template: >-
      {{ .ConventionalFileName }}
    vendor: Koolsign
    homepage: https://github.com/koolsign/hddmount-tui
    maintainer: Koolsign <noreply@example.com>
    description: |-
      HDD를 안전하게 마운트하기 위한 TUI 도구.
      1TB/2TB/4TB/8TB 디스크 자동 감지, 파티션/포맷 이중 확인,
      fstab 자동 등록 및 검증 기능을 제공합니다.
    license: MIT
    formats:
      - deb
    bindir: /usr/bin
    section: utils
    priority: optional
    recommends:
      - parted
      - e2fsprogs
      - util-linux

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: koolsign
    name: hddmount-tui
  draft: false
